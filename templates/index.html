<!doctype html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#c0392b">
<link rel="manifest" href="/static/manifest.json">
<title>ქართული — мій словник</title>
<style>
  html { touch-action: pan-x pan-y; }
  :root {
    --bg: #f4f2ee;
    --card: #ffffff;
    --text: #2b2622;
    --muted: #8a8178;
    --accent: #c0392b;
    --border: #e3ded6;
    --warn: #b8860b;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1a18;
      --card: #262320;
      --text: #ece7e0;
      --muted: #9a9186;
      --accent: #e05545;
      --border: #38342f;
      --warn: #d4a017;
    }
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    background: var(--bg); color: var(--text);
    max-width: 560px; margin: 0 auto; padding: 16px 12px 48px;
  }
  h1 { font-size: 1.25rem; margin-bottom: 4px; }
  .status { color: var(--muted); font-size: .85rem; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .status .dot { width: 8px; height: 8px; border-radius: 50%; background: #4caf50; display: inline-block; }
  .status.offline .dot { background: var(--warn); }
  .status button {
    background: none; border: 1px solid var(--border); color: var(--muted);
    border-radius: 6px; padding: 2px 10px; font-size: .8rem; cursor: pointer;
  }
  form.add {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px; margin-bottom: 16px;
    display: flex; flex-direction: column; gap: 10px;
  }
  input, textarea {
    width: 100%; padding: 12px; font-size: 1.05rem;
    border: 1px solid var(--border); border-radius: 8px;
    background: var(--bg); color: var(--text);
  }
  input:focus, textarea:focus { outline: 2px solid var(--accent); border-color: transparent; }
  textarea { resize: vertical; min-height: 44px; }
  form.add button {
    padding: 12px; font-size: 1.05rem; font-weight: 600;
    border: none; border-radius: 8px; cursor: pointer;
    background: var(--accent); color: #fff;
  }
  .toolbar { display: flex; gap: 8px; margin-bottom: 12px; }
  .toolbar input { flex: 1; padding: 10px 12px; font-size: .95rem; }
  .toolbar button {
    display: flex; align-items: center; padding: 0 14px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); text-decoration: none;
    font-size: .9rem; white-space: nowrap; cursor: pointer; font-family: inherit;
  }
  .word {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 12px 14px; margin-bottom: 8px;
    display: flex; align-items: flex-start; gap: 10px;
  }
  .word .body { flex: 1; min-width: 0; }
  .word .ka { font-size: 1.15rem; font-weight: 600; }
  .word .tr { color: var(--muted); margin-top: 2px; }
  .word .ex { color: var(--muted); font-size: .85rem; margin-top: 6px; font-style: italic; }
  .word .pending {
    color: var(--warn); font-size: .75rem; margin-top: 6px;
  }
  .word .actions { display: flex; flex-direction: column; gap: 6px; }
  .word .actions a, .word .actions button {
    background: none; border: none; padding: 6px; cursor: pointer;
    color: var(--muted); font-size: 1rem; text-decoration: none; text-align: center;
  }
  .empty { text-align: center; color: var(--muted); padding: 32px 0; }
  [hidden] { display: none !important; }
  .wod {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 10px 14px; margin-bottom: 12px;
    font-size: .9rem;
  }
  .wod .wod-label { color: var(--muted); font-size: .75rem; margin-bottom: 2px; }
  .wod .wod-ka { font-weight: 600; font-size: 1.05rem; }
  .wod .wod-tr { color: var(--muted); }
  .stats {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 12px 14px; margin-bottom: 12px;
    font-size: .9rem; display: flex; flex-direction: column; gap: 6px;
  }
  .stats .muted { color: var(--muted); }
  .tagbar {
    display: flex; gap: 6px; overflow-x: auto; margin-bottom: 12px;
    -webkit-overflow-scrolling: touch; scrollbar-width: none;
  }
  .tagbar::-webkit-scrollbar { display: none; }
  .chip {
    padding: 5px 12px; border-radius: 999px; font-size: .8rem;
    border: 1px solid var(--border); background: var(--card);
    color: var(--muted); cursor: pointer; white-space: nowrap; flex-shrink: 0;
  }
  .chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .word .tags { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 6px; }
  .word .tag {
    font-size: .7rem; padding: 2px 8px; border-radius: 999px;
    border: 1px solid var(--border); color: var(--muted);
  }
  #review-btn {
    width: 100%; padding: 12px; font-size: 1rem; font-weight: 600;
    border: 1px solid var(--border); border-radius: 12px;
    background: var(--card); color: var(--text); cursor: pointer;
    margin-bottom: 12px;
  }
  #review-btn:disabled { color: var(--muted); cursor: default; }
  #review-overlay {
    position: fixed; inset: 0; z-index: 10; background: var(--bg);
    display: flex; flex-direction: column;
    max-width: 560px; margin: 0 auto; padding: 16px 12px;
  }
  .rv-top {
    display: flex; justify-content: space-between; align-items: center;
    color: var(--muted); font-size: .9rem; margin-bottom: 24px;
  }
  .rv-top button {
    background: none; border: none; font-size: 1.3rem; cursor: pointer;
    color: var(--muted); padding: 4px 10px;
  }
  .rv-card {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    justify-content: center; text-align: center; gap: 14px; min-height: 0;
  }
  .rv-dir { color: var(--muted); font-size: .85rem; }
  .rv-front { font-size: 1.9rem; font-weight: 700; overflow-wrap: anywhere; }
  .rv-back { font-size: 1.4rem; color: var(--accent); overflow-wrap: anywhere; }
  .rv-ex { color: var(--muted); font-style: italic; font-size: .95rem; }
  .rv-done { font-size: 1.2rem; }
  .rv-top-btns { display: flex; gap: 4px; }
  .rv-verdict { font-size: 1rem; font-weight: 600; }
  .rv-verdict.ok { color: #4caf50; }
  .rv-verdict.bad { color: var(--accent); }
  .rv-type { display: flex; gap: 8px; padding-bottom: 4px; }
  .rv-type input { flex: 1; min-width: 0; }
  .rv-type button {
    padding: 12px 16px; font-size: 1rem; font-weight: 600; border: none;
    border-radius: 8px; cursor: pointer; background: var(--accent); color: #fff;
  }
  .rv-actions { padding: 16px 0 24px; display: flex; gap: 10px; }
  .rv-actions button {
    flex: 1; padding: 16px; font-size: 1.05rem; font-weight: 600;
    border: none; border-radius: 10px; cursor: pointer;
  }
  #rv-reveal { background: var(--accent); color: #fff; }
  #rv-wrong { background: var(--card); border: 1px solid var(--border); color: var(--text); }
  #rv-right { background: var(--accent); color: #fff; }
</style>
</head>
<body>
  <h1>ქართული — мій словник</h1>
  <p class="status" id="status"><span class="dot"></span><span id="status-text">…</span>
    <button type="button" id="sync-btn" title="Синхронізувати">⟳ синхр.</button>
    <button type="button" id="stats-btn" title="Статистика">📊</button>
  </p>

  <div class="wod" id="wod" hidden></div>

  <div class="stats" id="stats" hidden></div>

  <form class="add" id="add-form">
    <input name="georgian" id="f-georgian" placeholder="Грузинське слово" required autocomplete="off" autofocus lang="ka">
    <input name="translation" id="f-translation" placeholder="Переклад" required autocomplete="off" lang="uk">
    <textarea name="example" id="f-example" rows="1" placeholder="Приклад / нотатка (необов'язково)"></textarea>
    <input name="tags" id="f-tags" placeholder="Теги через кому (необов'язково)" autocomplete="off">
    <button type="submit">Додати</button>
  </form>

  <button type="button" id="review-btn">🎓 Повторення</button>

  <div class="tagbar" id="tagbar" hidden></div>

  <div class="toolbar">
    <input type="search" id="search" placeholder="Пошук…">
    <button type="button" id="csv-btn">⬇ CSV</button>
    <button type="button" id="import-btn">⬆ CSV</button>
    <input type="file" id="import-file" accept=".csv,text/csv" hidden>
  </div>

  <div id="list"></div>

  <div id="review-overlay" hidden>
    <div class="rv-top">
      <span id="rv-progress"></span>
      <span class="rv-top-btns">
        <button type="button" id="rv-mode"></button>
        <button type="button" id="rv-close" title="Закрити">✕</button>
      </span>
    </div>
    <div class="rv-card">
      <p class="rv-dir" id="rv-dir"></p>
      <p class="rv-front" id="rv-front"></p>
      <p class="rv-verdict" id="rv-verdict" hidden></p>
      <p class="rv-back" id="rv-back" hidden></p>
      <p class="rv-ex" id="rv-ex" hidden></p>
      <p class="rv-done" id="rv-done" hidden></p>
    </div>
    <form class="rv-type" id="rv-type" hidden>
      <input id="rv-input" autocomplete="off" autocapitalize="off"
             autocorrect="off" spellcheck="false" placeholder="Відповідь…">
      <button type="submit">Перевірити</button>
    </form>
    <div class="rv-actions">
      <button type="button" id="rv-reveal">Показати відповідь</button>
      <button type="button" id="rv-wrong" hidden>❌ Не знав</button>
      <button type="button" id="rv-right" hidden>✅ Знав</button>
    </div>
  </div>

<script>
"use strict";

// ---------- локальне сховище ----------

const store = {
  load() {
    try { return JSON.parse(localStorage.getItem("words") || "[]"); }
    catch { return []; }
  },
  save(words) { localStorage.setItem("words", JSON.stringify(words)); },
};

let words = store.load();
let online = null;   // null = ще не знаємо

// прогрес повторень: ключ "uuid|напрямок" → {level, due_at, reviewed_at, synced}
let reviews = (() => {
  try { return JSON.parse(localStorage.getItem("reviews") || "{}"); }
  catch { return {}; }
})();
function saveReviews() { localStorage.setItem("reviews", JSON.stringify(reviews)); }

// журнал повторень по днях (локальна дата → кількість оцінених карток);
// живе тільки на цьому пристрої, потрібен для статистики й серії днів
let reviewLog = (() => {
  try { return JSON.parse(localStorage.getItem("reviewLog") || "{}"); }
  catch { return {}; }
})();

function localDateKey(d) {
  d = d || new Date();
  const p = (n) => String(n).padStart(2, "0");
  return `${d.getFullYear()}-${p(d.getMonth() + 1)}-${p(d.getDate())}`;
}

function logReview() {
  const k = localDateKey();
  reviewLog[k] = (reviewLog[k] || 0) + 1;
  localStorage.setItem("reviewLog", JSON.stringify(reviewLog));
}

// "їжа, Дієслова,їжа" → "їжа, дієслова" (трім, нижній регістр, без дублів)
function normalizeTags(raw) {
  const seen = [];
  for (let t of (raw || "").split(",")) {
    t = t.trim().toLowerCase();
    if (t && !seen.includes(t)) seen.push(t);
  }
  return seen.join(", ");
}

function tagList(w) {
  return (w.tags || "").split(",").map((t) => t.trim()).filter(Boolean);
}

let activeTag = null;   // активний фільтр списку і повторення

function wordsInScope() {
  return activeTag ? words.filter((w) => tagList(w).includes(activeTag)) : words;
}

function makeUuid() {
  if (crypto.randomUUID) return crypto.randomUUID();
  // insecure context не має randomUUID
  return "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g, (c) => {
    const r = Math.random() * 16 | 0;
    return (c === "x" ? r : (r & 0x3 | 0x8)).toString(16);
  });
}

// ---------- синхронізація ----------

// Без Wi-Fi (не просто "інтернет лежить") fetch() може висіти ~20-30с, поки
// ОС не здасться достукатись до локальної IP. Обмежуємо коротким таймаутом,
// щоб індикатор статусу і кнопки не зависали.
const NETWORK_TIMEOUT_MS = 4000;

function fetchWithTimeout(url, options) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), NETWORK_TIMEOUT_MS);
  return fetch(url, { ...options, signal: controller.signal })
    .finally(() => clearTimeout(timer));
}

async function sync() {
  const pending = words.filter((w) => !w.synced);
  const pendingReviews = Object.values(reviews).filter((r) => !r.synced);
  try {
    const res = await fetchWithTimeout("/api/sync", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ words: pending, reviews: pendingReviews }),
    });
    if (!res.ok) throw new Error("sync failed");
    const data = await res.json();
    words = data.words.map((w) => ({ ...w, synced: true }));
    store.save(words);
    reviews = {};
    for (const r of data.reviews || []) {
      reviews[r.word_uuid + "|" + r.direction] = { ...r, synced: true };
    }
    saveReviews();
    online = true;
  } catch {
    online = false;
  }
  render();
}

// ---------- дії ----------

function addWord(georgian, translation, example, tags) {
  words.unshift({
    uuid: makeUuid(),
    id: null,
    georgian, translation, example,
    tags: normalizeTags(tags),
    created_at: new Date().toISOString().slice(0, 19).replace("T", " "),
    synced: false,
  });
  store.save(words);
  render();
  sync();
}

function dropLocalWord(uuid) {
  words = words.filter((x) => x.uuid !== uuid);
  store.save(words);
  for (const key of Object.keys(reviews)) {
    if (key.startsWith(uuid + "|")) delete reviews[key];
  }
  saveReviews();
}

async function deleteWord(w) {
  if (!confirm(`Видалити «${w.georgian}»?`)) return;
  if (!w.synced) {
    dropLocalWord(w.uuid);
    render();
    return;
  }
  try {
    const res = await fetchWithTimeout(`/api/words/${w.uuid}`, { method: "DELETE" });
    if (!res.ok) throw new Error();
    dropLocalWord(w.uuid);
    online = true;
  } catch {
    online = false;
    alert("Немає з'єднання з сервером — видалення збереженого слова можливе лише онлайн.");
  }
  render();
}

// ---------- повторення (SRS) ----------

// Інтервали в днях для рівнів 1..7. Правильна відповідь піднімає рівень на 1,
// неправильна скидає на 0 (картка повернеться ще в цій же сесії).
const INTERVALS = [1, 3, 7, 14, 30, 60, 120];
const NEW_PER_SESSION = 10;   // щоб перша сесія не завалила сотнею нових карток
const DIRECTIONS = ["ka2uk", "uk2ka"];

function nowStr() {
  return new Date().toISOString().slice(0, 19).replace("T", " ");
}

function dueDateStr(days) {
  return new Date(Date.now() + days * 86400000).toISOString()
    .slice(0, 19).replace("T", " ");
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// картки до повторення: прострочені + нові (ліміт на сесію);
// активний тег-фільтр обмежує і повторення — можна тренувати тему окремо
function collectDue() {
  const now = nowStr();
  const due = [], fresh = [];
  for (const w of wordsInScope()) {
    for (const dir of DIRECTIONS) {
      const r = reviews[w.uuid + "|" + dir];
      if (!r) fresh.push({ w, dir });
      else if (r.due_at <= now) due.push({ w, dir });
    }
  }
  return { due, fresh };
}

// ---- перевірка надрукованої відповіді ----

function normAnswer(s) {
  return (s || "").toLowerCase()
    .replace(/\(.*?\)/g, " ")                 // "(з поясненням)" не обов'язкове
    .replace(/[.,;:!?'"«»„"”()\/\\-]/g, " ")
    .replace(/\s+/g, " ")
    .trim();
}

// "дякую, спасибі" → зараховуємо і повну форму, і кожен варіант окремо
function answerVariants(s) {
  const out = [];
  for (const v of [s, ...s.split(/[,;\/]/)]) {
    const n = normAnswer(v);
    if (n && !out.includes(n)) out.push(n);
  }
  return out;
}

// відстань Левенштейна ≤ 1 (одна одруківка: заміна, пропуск або зайва літера)
function within1Edit(a, b) {
  if (a === b) return true;
  if (Math.abs(a.length - b.length) > 1) return false;
  let i = 0, j = 0, edits = 0;
  while (i < a.length && j < b.length) {
    if (a[i] === b[j]) { i++; j++; continue; }
    if (++edits > 1) return false;
    if (a.length > b.length) i++;
    else if (b.length > a.length) j++;
    else { i++; j++; }
  }
  return edits + (a.length - i) + (b.length - j) <= 1;
}

function checkAnswer(typed, correct) {
  const t = normAnswer(typed);
  if (!t) return false;
  for (const v of answerVariants(correct)) {
    if (t === v) return true;
    if (v.length >= 5 && within1Edit(t, v)) return true;   // коротким словам одруківку не прощаємо
  }
  return false;
}

let queue = [];
let currentCard = null;
let doneCount = 0;
// "type" — друкуєш відповідь, "flip" — класичний показ; вибір запам'ятовується
let reviewMode = localStorage.getItem("reviewMode") || "type";

const overlay = document.getElementById("review-overlay");
const rvProgress = document.getElementById("rv-progress");
const rvDir = document.getElementById("rv-dir");
const rvFront = document.getElementById("rv-front");
const rvBack = document.getElementById("rv-back");
const rvEx = document.getElementById("rv-ex");
const rvDone = document.getElementById("rv-done");
const rvReveal = document.getElementById("rv-reveal");
const rvWrong = document.getElementById("rv-wrong");
const rvRight = document.getElementById("rv-right");
const rvMode = document.getElementById("rv-mode");
const rvType = document.getElementById("rv-type");
const rvInput = document.getElementById("rv-input");
const rvVerdict = document.getElementById("rv-verdict");

function startReview() {
  const { due, fresh } = collectDue();
  queue = [...shuffle(due), ...shuffle(fresh).slice(0, NEW_PER_SESSION)];
  doneCount = 0;
  overlay.hidden = false;
  nextCard();
}

function updateModeBtn() {
  rvMode.textContent = reviewMode === "type" ? "⌨️" : "👁";
  rvMode.title = reviewMode === "type"
    ? "Режим: друкування відповіді (тап — перемкнути на показ)"
    : "Режим: показ відповіді (тап — перемкнути на друкування)";
}

function presentCard() {
  const finished = currentCard === null;
  updateModeBtn();
  rvDone.hidden = !finished;
  rvDir.hidden = rvFront.hidden = finished;
  rvBack.hidden = rvEx.hidden = rvVerdict.hidden = true;
  rvWrong.hidden = rvRight.hidden = true;
  rvMode.hidden = finished;
  if (finished) {
    rvReveal.hidden = rvType.hidden = true;
    rvDone.textContent = doneCount
      ? `Готово! Повторено карток: ${doneCount} 🎉`
      : "Наразі немає карток до повторення. Приходь пізніше!";
    rvProgress.textContent = "";
    return;
  }
  const { w, dir } = currentCard;
  rvProgress.textContent = `Залишилось: ${queue.length + 1}`;
  rvDir.textContent = dir === "ka2uk" ? "ქართული → переклад" : "переклад → ქართული";
  rvFront.textContent = dir === "ka2uk" ? w.georgian : w.translation;
  rvBack.textContent = dir === "ka2uk" ? w.translation : w.georgian;
  if (reviewMode === "type") {
    rvReveal.hidden = true;
    rvType.hidden = false;
    rvInput.value = "";
    // семантична підказка мови поля (клавіатуру перемикаєш сам)
    rvInput.lang = dir === "uk2ka" ? "ka" : "uk";
    rvInput.placeholder = dir === "uk2ka" ? "ქართული…" : "Переклад…";
    rvInput.focus();
  } else {
    rvType.hidden = true;
    rvReveal.hidden = false;
  }
}

function nextCard() {
  currentCard = queue.shift() || null;
  presentCard();
}

function reveal() {
  rvBack.hidden = false;
  if (currentCard.w.example) {
    rvEx.textContent = currentCard.w.example;
    rvEx.hidden = false;
  }
  rvReveal.hidden = rvType.hidden = true;
  rvWrong.hidden = rvRight.hidden = false;
}

function checkTyped() {
  const typed = rvInput.value;
  const { w, dir } = currentCard;
  const correctText = dir === "ka2uk" ? w.translation : w.georgian;
  if (normAnswer(typed)) {
    const ok = checkAnswer(typed, correctText);
    rvVerdict.textContent = ok ? "✅ Правильно!" : `❌ Ти написав: ${typed.trim()}`;
    rvVerdict.className = "rv-verdict " + (ok ? "ok" : "bad");
    rvVerdict.hidden = false;
  }
  // порожній ввід = "не пам'ятаю, покажи" — без вердикту
  reveal();
}

function grade(correct) {
  const { w, dir } = currentCard;
  const key = w.uuid + "|" + dir;
  const prevLevel = reviews[key] ? reviews[key].level : 0;
  const level = correct ? Math.min(prevLevel + 1, INTERVALS.length) : 0;
  reviews[key] = {
    word_uuid: w.uuid,
    direction: dir,
    level,
    due_at: correct ? dueDateStr(INTERVALS[level - 1]) : nowStr(),
    reviewed_at: nowStr(),
    synced: false,
  };
  saveReviews();
  logReview();
  if (correct) doneCount++;
  else queue.push(currentCard);   // забуту картку — в кінець цієї ж сесії
  nextCard();
}

function closeReview() {
  overlay.hidden = true;
  render();
  sync();   // відправити свіжі оцінки на сервер
}

// ---------- CSV-експорт ----------

// Клієнтський (не серверний) експорт: PWA в standalone-режимі не має кнопки
// "назад", тож звичайне посилання на /export.csv "виносить" з застосунку
// без можливості повернутись. Генеруємо CSV з уже наявних локальних даних —
// заодно працює й офлайн.
function csvField(value) {
  const s = String(value ?? "");
  return /["\r\n,]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
}

function exportCsv() {
  // uuid потрібен, щоб імпорт міг оновити саме це слово, а не створити дублікат
  const rows = [["uuid", "georgian", "translation", "example", "tags", "created_at"], ...words.map(
    (w) => [w.uuid, w.georgian, w.translation, w.example, w.tags || "", w.created_at]
  )];
  const csv = "﻿" + rows.map((r) => r.map(csvField).join(",")).join("\r\n") + "\r\n";
  const blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `dictionary-${new Date().toISOString().slice(0, 10)}.csv`;
  document.body.append(a);
  a.click();
  a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

// ---------- CSV-імпорт ----------

// Розбирає CSV з лапками, комами й переносами рядків усередині полів
function parseCsv(text) {
  text = text.replace(/^﻿/, "");
  const rows = [];
  let row = [], field = "", inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (inQuotes) {
      if (ch === '"') {
        if (text[i + 1] === '"') { field += '"'; i++; }
        else inQuotes = false;
      } else field += ch;
    } else if (ch === '"') {
      inQuotes = true;
    } else if (ch === ",") {
      row.push(field); field = "";
    } else if (ch === "\n") {
      row.push(field); field = "";
      rows.push(row); row = [];
    } else if (ch !== "\r") {
      field += ch;
    }
  }
  if (field !== "" || row.length) { row.push(field); rows.push(row); }
  return rows.filter((r) => r.some((f) => f.trim() !== ""));
}

// CSV → список слів; колонки шукаються по заголовку, порядок неважливий
function csvToWords(text) {
  const rows = parseCsv(text);
  if (rows.length < 2) throw new Error("Файл порожній або без рядків даних.");
  const header = rows[0].map((h) => h.trim().toLowerCase());
  const col = {};
  for (const name of ["uuid", "georgian", "translation", "example", "tags", "created_at"]) {
    col[name] = header.indexOf(name);
  }
  if (col.georgian === -1 || col.translation === -1) {
    throw new Error("У заголовку CSV мають бути колонки georgian і translation.");
  }
  const pick = (r, name) => (col[name] === -1 ? "" : (r[col[name]] || "").trim());
  return rows.slice(1).map((r) => ({
    uuid: pick(r, "uuid"),
    georgian: pick(r, "georgian"),
    translation: pick(r, "translation"),
    example: pick(r, "example"),
    tags: pick(r, "tags"),
    created_at: pick(r, "created_at"),
  }));
}

async function importCsv(file) {
  let incoming;
  try {
    incoming = csvToWords(await file.text());
  } catch (err) {
    alert("Не вдалося прочитати CSV: " + err.message);
    return;
  }
  const known = new Set(words.map((w) => w.uuid));
  const toUpdate = incoming.filter((r) => r.uuid && known.has(r.uuid)).length;
  const toCreate = incoming.length - toUpdate;
  if (!confirm(`Імпорт: рядків ${incoming.length} — оновиться до ${toUpdate}, нових до ${toCreate}. Продовжити?`)) return;
  try {
    const res = await fetchWithTimeout("/api/import", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ words: incoming }),
    });
    if (!res.ok) throw new Error();
    const c = await res.json();
    await sync();   // підтягнути оновлений стан з сервера
    alert(`Імпорт завершено: оновлено ${c.updated}, додано ${c.created}, без змін ${c.unchanged}, пропущено ${c.skipped}.`);
  } catch {
    online = false;
    render();
    alert("Імпорт потребує з'єднання з сервером — спробуй, коли будеш у домашній мережі.");
  }
}

// ---------- слово дня та статистика ----------

// детерміноване на день: у всіх рендерах те саме слово, завтра — інше
function wordOfDay() {
  if (!words.length) return null;
  const sorted = [...words].sort((a, b) => (a.uuid < b.uuid ? -1 : 1));
  let h = 0;
  for (const ch of localDateKey()) h = (h * 31 + ch.charCodeAt(0)) >>> 0;
  return sorted[h % sorted.length];
}

function renderWod() {
  const box = document.getElementById("wod");
  const w = wordOfDay();
  box.hidden = !w;
  if (!w) return;
  box.replaceChildren(
    el("div", "wod-label", "Слово дня"),
    el("div", "wod-ka", w.georgian),
    el("div", "wod-tr", w.translation + (w.example ? " · " + w.example : "")),
  );
}

function streakDays() {
  let s = 0;
  const d = new Date();
  // якщо сьогодні ще не повторював — серія рахується до вчора включно
  if (!(reviewLog[localDateKey(d)] > 0)) d.setDate(d.getDate() - 1);
  while (reviewLog[localDateKey(d)] > 0) {
    s++;
    d.setDate(d.getDate() - 1);
  }
  return s;
}

function statsData() {
  const weekAgo = new Date(Date.now() - 7 * 86400000).toISOString()
    .slice(0, 19).replace("T", " ");
  const addedWeek = words.filter((w) => w.created_at >= weekAgo).length;

  // рівень картки = поточний рівень SRS; слово має 2 картки (напрямки)
  let fresh = 0, learning = 0, solid = 0;
  for (const w of words) {
    for (const dir of DIRECTIONS) {
      const r = reviews[w.uuid + "|" + dir];
      const level = r ? r.level : 0;
      if (level === 0) fresh++;
      else if (level <= 3) learning++;
      else solid++;
    }
  }

  const last7 = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    last7.push(reviewLog[localDateKey(d)] || 0);
  }

  return {
    total: words.length,
    addedWeek,
    fresh, learning, solid,
    reviewedToday: reviewLog[localDateKey()] || 0,
    streak: streakDays(),
    last7,
  };
}

let statsVisible = false;

function renderStats() {
  const box = document.getElementById("stats");
  box.hidden = !statsVisible;
  if (!statsVisible) return;
  const s = statsData();
  box.replaceChildren(
    el("div", null, `Слів: ${s.total}` +
      (s.addedWeek ? ` (+${s.addedWeek} за 7 днів)` : "")),
    el("div", null, `Картки: 🆕 нові ${s.fresh} · 📖 вивчаються ${s.learning} · 💪 закріплені ${s.solid}`),
    el("div", null, `Сьогодні повторено: ${s.reviewedToday}` +
      (s.streak ? ` · серія: ${s.streak} дн. 🔥` : "")),
    el("div", "muted", `Останні 7 днів: ${s.last7.join(" · ")}`),
  );
}

// ---------- рендеринг ----------

const listEl = document.getElementById("list");
const statusEl = document.getElementById("status");
const statusText = document.getElementById("status-text");
const searchEl = document.getElementById("search");

function el(tag, cls, text) {
  const node = document.createElement(tag);
  if (cls) node.className = cls;
  if (text !== undefined) node.textContent = text;
  return node;
}

function renderTagbar() {
  const tagbar = document.getElementById("tagbar");
  const counts = new Map();
  for (const w of words) {
    for (const t of tagList(w)) counts.set(t, (counts.get(t) || 0) + 1);
  }
  if (activeTag && !counts.has(activeTag)) activeTag = null;
  tagbar.hidden = counts.size === 0;
  tagbar.replaceChildren();
  if (!counts.size) return;
  const allChip = el("button", "chip" + (activeTag === null ? " active" : ""),
    `усі (${words.length})`);
  allChip.onclick = () => { activeTag = null; render(); };
  tagbar.append(allChip);
  for (const [tag, n] of [...counts.entries()].sort((a, b) => b[1] - a[1])) {
    const chip = el("button", "chip" + (activeTag === tag ? " active" : ""),
      `${tag} (${n})`);
    chip.onclick = () => { activeTag = activeTag === tag ? null : tag; render(); };
    tagbar.append(chip);
  }
}

function render() {
  renderWod();
  renderStats();
  renderTagbar();
  const q = searchEl.value.trim().toLowerCase();
  const scope = wordsInScope();
  const shown = q
    ? scope.filter((w) =>
        w.georgian.toLowerCase().includes(q) ||
        w.translation.toLowerCase().includes(q))
    : scope;

  listEl.replaceChildren();
  for (const w of shown) {
    const card = el("div", "word");
    const body = el("div", "body");
    body.append(el("div", "ka", w.georgian), el("div", "tr", w.translation));
    if (w.example) body.append(el("div", "ex", w.example));
    const wTags = tagList(w);
    if (wTags.length) {
      const tagsEl = el("div", "tags");
      for (const t of wTags) tagsEl.append(el("span", "tag", t));
      body.append(tagsEl);
    }
    if (!w.synced) body.append(el("div", "pending", "⏳ не синхронізовано"));
    card.append(body);

    const actions = el("div", "actions");
    if (w.synced && w.id != null && online) {
      const editLink = el("a", null, "✎");
      editLink.href = `/edit/${w.id}`;
      editLink.title = "Редагувати";
      actions.append(editLink);
    }
    const delBtn = el("button", null, "✕");
    delBtn.title = "Видалити";
    delBtn.onclick = () => deleteWord(w);
    actions.append(delBtn);
    card.append(actions);
    listEl.append(card);
  }
  if (!shown.length) {
    listEl.append(el("p", "empty",
      q || activeTag ? "Нічого не знайдено." : "Поки що порожньо — додай перше слово!"));
  }

  const pending = words.filter((w) => !w.synced).length;
  statusEl.classList.toggle("offline", online === false);
  let text = `Слів: ${words.length}`;
  if (online === false) text += " · офлайн";
  if (pending) text += ` · ⏳ ${pending} не синхр.`;
  statusText.textContent = text;

  const { due, fresh } = collectDue();
  const total = due.length + Math.min(fresh.length, NEW_PER_SESSION);
  const reviewBtn = document.getElementById("review-btn");
  const label = activeTag ? `🎓 Повторення: ${activeTag}` : "🎓 Повторення";
  reviewBtn.textContent = total ? `${label} (${total})` : label;
  reviewBtn.disabled = !total;
}

// ---------- події ----------

document.getElementById("add-form").addEventListener("submit", (e) => {
  e.preventDefault();
  const georgian = document.getElementById("f-georgian").value.trim();
  const translation = document.getElementById("f-translation").value.trim();
  const example = document.getElementById("f-example").value.trim();
  const tags = document.getElementById("f-tags").value;
  if (!georgian || !translation) return;
  addWord(georgian, translation, example, tags);
  e.target.reset();
  document.getElementById("f-georgian").focus();
});

searchEl.addEventListener("input", render);
document.getElementById("sync-btn").addEventListener("click", sync);
document.getElementById("stats-btn").addEventListener("click", () => {
  statsVisible = !statsVisible;
  render();
});
document.getElementById("csv-btn").addEventListener("click", exportCsv);
const importFile = document.getElementById("import-file");
document.getElementById("import-btn").addEventListener("click", () => importFile.click());
importFile.addEventListener("change", () => {
  if (importFile.files.length) {
    importCsv(importFile.files[0]);
    importFile.value = "";
  }
});
document.getElementById("review-btn").addEventListener("click", startReview);
document.getElementById("rv-close").addEventListener("click", closeReview);
rvReveal.addEventListener("click", reveal);
rvWrong.addEventListener("click", () => grade(false));
rvRight.addEventListener("click", () => grade(true));
rvType.addEventListener("submit", (e) => {
  e.preventDefault();
  checkTyped();
});
rvMode.addEventListener("click", () => {
  reviewMode = reviewMode === "type" ? "flip" : "type";
  localStorage.setItem("reviewMode", reviewMode);
  presentCard();   // перепоказати поточну картку в новому режимі
});
window.addEventListener("online", sync);

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/sw.js");
}

render();
sync();
