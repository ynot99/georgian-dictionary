<!doctype html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#c0392b">
<link rel="manifest" href="/static/manifest.json">
<link rel="stylesheet" href="/static/style.css">
<title>ქართული — мій словник</title>
</head>
<body>
  <h1>ქართული — мій словник</h1>
  <p class="status" id="status"><span class="dot"></span><span id="status-text">…</span>
    <button type="button" id="sync-btn" title="Синхронізувати">⟳ синхр.</button>
    <button type="button" id="stats-btn" title="Статистика">📊</button>
  </p>

  <div class="wod" id="wod" hidden></div>

  <div class="stats" id="stats" hidden></div>

  <form class="add" id="add-form">
    <input name="georgian" id="f-georgian" placeholder="Грузинське слово" required autocomplete="off" autofocus lang="ka">
    <input name="translation" id="f-translation" placeholder="Переклад" required autocomplete="off" lang="uk">
    <textarea name="example" id="f-example" rows="1" placeholder="Приклад / нотатка (необов'язково)"></textarea>
    <input name="tags" id="f-tags" placeholder="Теги через кому (необов'язково)" autocomplete="off">
    <button type="submit">Додати</button>
  </form>

  <div class="btnrow">
    <button type="button" id="review-btn">🎓 Повторення</button>
    <button type="button" id="chat-btn">💬 Чат</button>
    <button type="button" id="notes-btn">📖 Нотатки</button>
  </div>

  <div class="tagbar" id="tagbar" hidden></div>

  <div class="toolbar">
    <input type="search" id="search" placeholder="Пошук…">
    <button type="button" id="csv-btn">⬇ CSV</button>
    <button type="button" id="import-btn">⬆ CSV</button>
    <input type="file" id="import-file" accept=".csv,text/csv" hidden>
  </div>

  <div id="list"></div>

  <div id="review-overlay" hidden>
    <div class="rv-top">
      <span id="rv-progress"></span>
      <span class="rv-top-btns">
        <button type="button" id="rv-mode"></button>
        <button type="button" id="rv-strict"></button>
        <button type="button" id="rv-close" title="Закрити">✕</button>
      </span>
    </div>
    <div class="rv-card">
      <p class="rv-dir" id="rv-dir"></p>
      <p class="rv-front" id="rv-front"></p>
      <p class="rv-cloze" id="rv-cloze" hidden></p>
      <p class="rv-verdict" id="rv-verdict" hidden></p>
      <p class="rv-back" id="rv-back" hidden></p>
      <p class="rv-ex" id="rv-ex" hidden></p>
      <p class="rv-done" id="rv-done" hidden></p>
    </div>
    <form class="rv-type" id="rv-type" hidden>
      <input id="rv-input" autocomplete="off" autocapitalize="off"
             autocorrect="off" spellcheck="false" placeholder="Відповідь…">
      <button type="submit">Перевірити</button>
    </form>
    <div class="rv-actions">
      <button type="button" id="rv-reveal">Показати відповідь</button>
      <button type="button" id="rv-wrong" hidden>❌ Не знав</button>
      <button type="button" id="rv-right" hidden>✅ Знав</button>
    </div>
    <p class="rv-hint" id="rv-hint" hidden></p>
  </div>

  <div id="chat-overlay" hidden>
    <div class="ch-top">
      <span class="ch-title">💬 Репетитор грузинської</span>
      <span class="rv-top-btns">
        <button type="button" id="ch-clear" title="Очистити історію">🗑</button>
        <button type="button" id="ch-close" title="Закрити">✕</button>
      </span>
    </div>
    <div id="chat-log"></div>
    <form id="chat-form">
      <input id="chat-input" placeholder="Напиши українською або грузинською…" autocomplete="off">
      <button type="submit" id="chat-send">➤</button>
    </form>
  </div>

  <div id="notes-overlay" hidden>
    <div class="ch-top">
      <span class="ch-title">📖 Нотатки з граматики</span>
      <span class="rv-top-btns">
        <button type="button" id="notes-review-btn" title="Повторити нотатки">🎓</button>
        <button type="button" id="notes-close" title="Закрити">✕</button>
      </span>
    </div>
    <div id="notes-log"></div>
    <div id="notes-review" hidden>
      <p class="rv-dir" id="nr-progress"></p>
      <div class="rv-card">
        <p class="rv-front" id="nr-title"></p>
        <p class="rv-back" id="nr-content" hidden></p>
        <p class="rv-done" id="nr-done" hidden></p>
      </div>
      <div class="rv-actions">
        <button type="button" id="nr-reveal">Показати</button>
        <button type="button" id="nr-wrong" hidden>❌ Не знав</button>
        <button type="button" id="nr-right" hidden>✅ Знав</button>
      </div>
    </div>
  </div>

<script src="/static/js/overlay.js"></script>
<script src="/static/js/store.js"></script>
<script src="/static/js/srs.js"></script>
<script src="/static/js/csv.js"></script>
<script src="/static/js/stats.js"></script>
<script src="/static/js/render.js"></script>
<script src="/static/js/chat.js"></script>
<script src="/static/js/notes.js"></script>
<script src="/static/js/main.js"></script>
</body>
</html>
