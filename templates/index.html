<!doctype html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ქართული — мій словник</title>
<style>
  :root {
    --bg: #f4f2ee;
    --card: #ffffff;
    --text: #2b2622;
    --muted: #8a8178;
    --accent: #c0392b;
    --border: #e3ded6;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1a18;
      --card: #262320;
      --text: #ece7e0;
      --muted: #9a9186;
      --accent: #e05545;
      --border: #38342f;
    }
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    background: var(--bg); color: var(--text);
    max-width: 560px; margin: 0 auto; padding: 16px 12px 48px;
  }
  h1 { font-size: 1.25rem; margin-bottom: 4px; }
  .subtitle { color: var(--muted); font-size: .85rem; margin-bottom: 16px; }
  form.add {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px; margin-bottom: 16px;
    display: flex; flex-direction: column; gap: 10px;
  }
  input, textarea {
    width: 100%; padding: 12px; font-size: 1.05rem;
    border: 1px solid var(--border); border-radius: 8px;
    background: var(--bg); color: var(--text);
  }
  input:focus, textarea:focus { outline: 2px solid var(--accent); border-color: transparent; }
  textarea { resize: vertical; min-height: 44px; }
  button {
    padding: 12px; font-size: 1.05rem; font-weight: 600;
    border: none; border-radius: 8px; cursor: pointer;
    background: var(--accent); color: #fff;
  }
  .toolbar { display: flex; gap: 8px; margin-bottom: 12px; }
  .toolbar form { flex: 1; display: flex; gap: 8px; }
  .toolbar input { padding: 10px 12px; font-size: .95rem; }
  .toolbar a {
    display: flex; align-items: center; padding: 0 14px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); text-decoration: none;
    font-size: .9rem; white-space: nowrap;
  }
  .word {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 12px 14px; margin-bottom: 8px;
    display: flex; align-items: flex-start; gap: 10px;
  }
  .word .body { flex: 1; min-width: 0; }
  .word .ka { font-size: 1.15rem; font-weight: 600; }
  .word .tr { color: var(--muted); margin-top: 2px; }
  .word .ex { color: var(--muted); font-size: .85rem; margin-top: 6px; font-style: italic; }
  .word .actions { display: flex; flex-direction: column; gap: 6px; }
  .word .actions a, .word .actions button {
    background: none; border: none; padding: 6px; cursor: pointer;
    color: var(--muted); font-size: 1rem; text-decoration: none;
  }
  .empty { text-align: center; color: var(--muted); padding: 32px 0; }
</style>
</head>
<body>
  <h1>ქართული — мій словник</h1>
  <p class="subtitle">Слів: {{ total }}</p>

  <form class="add" method="post" action="{{ url_for('add') }}">
    <input name="georgian" placeholder="Грузинське слово" required autocomplete="off" autofocus>
    <input name="translation" placeholder="Переклад" required autocomplete="off">
    <textarea name="example" rows="1" placeholder="Приклад / нотатка (необов'язково)"></textarea>
    <button type="submit">Додати</button>
  </form>

  <div class="toolbar">
    <form method="get" action="{{ url_for('index') }}">
      <input type="search" name="q" value="{{ q }}" placeholder="Пошук…">
    </form>
    <a href="{{ url_for('export_csv') }}">⬇ CSV</a>
  </div>

  {% for w in words %}
  <div class="word">
    <div class="body">
      <div class="ka">{{ w.georgian }}</div>
      <div class="tr">{{ w.translation }}</div>
      {% if w.example %}<div class="ex">{{ w.example }}</div>{% endif %}
    </div>
    <div class="actions">
      <a href="{{ url_for('edit', word_id=w.id) }}" title="Редагувати">✎</a>
      <form method="post" action="{{ url_for('delete', word_id=w.id) }}"
            onsubmit="return confirm('Видалити «{{ w.georgian }}»?')">
        <button type="submit" title="Видалити">✕</button>
      </form>
    </div>
  </div>
  {% else %}
  <p class="empty">{% if q %}Нічого не знайдено.{% else %}Поки що порожньо — додай перше слово!{% endif %}</p>
  {% endfor %}
</body>
</html>
